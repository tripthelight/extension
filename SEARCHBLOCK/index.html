<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Block</title>
</head>
<body>
  <h3>채널명 입력</h3>
  <p>아래 입력창에 입력한 채널명은 노출되지 않습니다.</p>
  <div class="list"></div>
  <div class="ipt-block">
    <label for="FOBIDDEN_WORD"></label>
    <input type="text" name="FOBIDDEN_WORD" id="FOBIDDEN_WORD" />
  </div>
  
  <h3>채널 주소 입력</h3>
  <p>아래 입력창에 입력한 채널 주소는 노출되지 않습니다.</p>
  <div class="list"></div>
  <div class="ipt-block">
    <label for="FOBIDDEN_URL"></label>
    <input type="text" name="FOBIDDEN_URL" id="FOBIDDEN_URL" />
  </div>

  <button type="button" class="btn_blocking">START BLOCKING</button>
</body>
</html>
